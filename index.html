<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Clyde Lens</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: sans-serif;
            background-color: #23272A;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 {
            margin-top: 20px;
            color: #7289da;
        }

        #reader {
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        #status {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            background: #2c2f33;
            font-weight: bold;
            text-align: center;
        }

        .zoom-container {
            width: 80%;
            max-width: 400px;
            margin: 20px 0;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        input[type=range] {
            width: 100%;
            accent-color: #7289da;
            height: 30px;
        }

        #tempCanvas {
            display: none;
        }
    </style>
</head>

        <label>🔍 Zoom</label>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
    </div>
